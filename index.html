<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CFC CashBook v0.9.1</title>
  <meta name="theme-color" content="#123c69" />
  <link rel="manifest" href="manifest.webmanifest?v=0.9.1" />
  <link rel="stylesheet" href="styles.css?v=0.9.1" />
</head>
<body>
  <div id="app" class="app-shell"></div>

  <datalist id="titleSuggestions"></datalist>
  <datalist id="noteSuggestions"></datalist>

  <template id="entryFormTemplate">
    <form class="simple-entry-form" id="entryForm">
      <input type="hidden" name="entry_type" value="OUT" />
      <label class="simple-amount">
        Amount
        <input name="amount" inputmode="decimal" type="number" step="0.01" min="0.01" required placeholder="₹ 0" autofocus />
      </label>
      <label>
        Party / Purpose
        <input name="title" list="titleSuggestions" required placeholder="Supplier, expense, cash received..." />
      </label>
      <label>
        Note / Reference <span class="muted-label">optional</span>
        <input name="note" list="noteSuggestions" placeholder="Reference, shift, bill number..." />
      </label>
      <label>
        Date
        <input name="entry_date" type="date" required />
      </label>
      <label>
        Attachment <span class="muted-label">optional</span>
        <input name="attachment" type="file" accept="image/*,.pdf" />
        <span class="muted-label">Attachments upload only when online.</span>
      </label>
      <div class="button-row">
        <button type="button" class="btn secondary" data-close-modal>Cancel</button>
        <button type="submit" class="btn primary">Save</button>
      </div>
    </form>
  </template>

  <template id="contraFormTemplate">
    <form class="form-grid" id="contraForm">
      <label>
        From ledger
        <select name="from_book_id" required></select>
      </label>
      <label>
        To ledger
        <select name="to_book_id" required></select>
      </label>
      <label>
        Amount
        <input name="amount" inputmode="decimal" type="number" step="0.01" min="0.01" required placeholder="₹ 0" />
      </label>
      <label>
        Date
        <input name="entry_date" type="date" required />
      </label>
      <label class="span-2">
        Remark
        <textarea name="note" rows="3" placeholder="Contra entry note..."></textarea>
      </label>
      <div class="button-row span-2">
        <button type="button" class="btn secondary" data-close-modal>Cancel</button>
        <button type="submit" class="btn primary">Save Contra</button>
      </div>
    </form>
  </template>

  <template id="editFormTemplate">
    <form class="simple-entry-form" id="editForm">
      <label>
        Type
        <select name="entry_type" required>
          <option value="OUT">Cash Out</option>
          <option value="IN">Cash In</option>
        </select>
      </label>
      <label class="simple-amount">
        Amount
        <input name="amount" inputmode="decimal" type="number" step="0.01" min="0.01" required />
      </label>
      <label>
        Party / Purpose
        <input name="title" list="titleSuggestions" required />
      </label>
      <label>
        Note / Reference <span class="muted-label">optional</span>
        <input name="note" list="noteSuggestions" />
      </label>
      <label>
        Date
        <input name="entry_date" type="date" required />
      </label>
      <label>
        Edit reason <span class="required">*</span>
        <input name="reason" required placeholder="Amount/name correction..." />
      </label>
      <div class="button-row">
        <button type="button" class="btn secondary" data-close-modal>Cancel</button>
        <button type="submit" class="btn primary">Save Edit</button>
      </div>
    </form>
  </template>


  <template id="ledgerFormTemplate">
    <form class="simple-entry-form" id="ledgerForm">
      <label>
        Ledger / Account name
        <input name="name" required placeholder="Factory Cash, Axis Bank, Factory Expense..." />
      </label>
      <label>
        Ledger type
        <select name="book_type" required>
          <option value="cash">Cash</option>
          <option value="bank">Bank</option>
          <option value="expense">Expense</option>
          <option value="other">Other</option>
        </select>
      </label>
      <label class="simple-amount">
        Opening balance
        <input name="opening_balance" inputmode="decimal" type="number" step="0.01" value="0" />
      </label>
      <label class="checkbox-line">
        <input name="is_private" type="checkbox" />
        Private ledger - visible to Owner/Admin only
      </label>
      <div class="notice">Ledger deactivation does not hard delete historical data. The ledger is marked inactive and hidden from the app.</div>
      <div class="button-row">
        <button type="button" class="btn secondary" data-close-modal>Cancel</button>
        <button type="submit" class="btn primary">Save Ledger</button>
      </div>
    </form>
  </template>

  <script src="config.js?v=0.9.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=0.9.1" defer></script>
</body>
</html>
